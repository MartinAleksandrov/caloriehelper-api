spring.application.name=caloriehelper-api

# Server
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# Active profile (default to "dev" locally; production sets this to "prod")
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# PostgreSQL — use env vars with safe local defaults
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/caloriehelper}
spring.datasource.username=${DB_USERNAME:caloriehelper_user}
spring.datasource.password=${DB_PASSWORD:changeme_in_production}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:ThisIsAVeryLongDevelopmentSecretKeyThatIsAtLeast256BitsLongForHS256SignatureUseEnvVarsInProd}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}