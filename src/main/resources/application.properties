spring.application.name=api
server.port=8080

# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://localhost:5432/caloriehelper
spring.datasource.username=caloriehelper_user
spring.datasource.password=changeme_in_production
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT settings
app.jwt.secret=ThisIsAVeryLongDevelopmentSecretKeyThatIsAtLeast256BitsLongForHS256SignatureUseEnvVarsInProd
app.jwt.expiration-ms=86400000